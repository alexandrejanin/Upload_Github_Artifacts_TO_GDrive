name: CI

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.node-version'
      - '.eslintrc.js'
      - '.github/**'
      - 'action.yml'
      - 'dist/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.node-version'
      - '.eslintrc.js'
      - '.github/**'
      - 'action.yml'
      - 'dist/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6.1.0
      with:
        node-version: '22.x'

    - name: Enable Corepack
      run: corepack enable

    - name: Enable Corepack
      run: corepack enable

    - name: Install dependencies
      run: yarn install

    - name: Lint
      run: yarn lint

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6.1.0
      with:
        node-version: '22.x'

    - name: Enable Corepack
      run: corepack enable

    - name: Enable Corepack
      run: corepack enable

    - name: Install dependencies
      run: yarn install

    - name: Build
      run: yarn build
      
    - name: Upload dist
      uses: actions/upload-artifact@v6
      with:
        name: dist
        path: dist/
        retention-days: 7
